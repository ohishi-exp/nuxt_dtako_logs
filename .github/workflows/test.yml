name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: false
      install_command: 'npm install'
      typecheck_command: 'echo "TODO: typecheck skipped (logi-proto migration pending)"'
      post_install_script: 'npx nuxt prepare'
      npm_scope: '@yhonda-ohishi-pub-dev'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
