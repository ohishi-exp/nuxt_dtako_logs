name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: read
  pull-requests: write
  id-token: write       # frontend-ci 内蔵 secret-verify が要求 (ci-workflows#38)

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: true
      has_integration: true
      compat_backend_repo: 'none'   # map 移行 PR の CI 通過用 opt-out (#59 Wave 3)
      install_command: 'npm install'
      post_install_script: 'npx nuxt prepare'
      npm_scope: '@ippoan'
      use_auth_client_dev: true   # PR 時に @ippoan/auth-client@dev を overlay install (createIdentityProxyHandler 取得、Refs rust-alc-api#434)
      integration_test_command: 'npx vitest run tests/integration'
      integration_env: 'API_BASE_URL=http://localhost:18080'
      # single-env 運用 (staging = prod)。PR (non-draft) / tag push どちらも
      # root config を `wrangler deploy` し、公開 domain (dtako-logs.ippoan.org)
      # に直接反映する。worker / domain を 1 本化し、deploy 先と公開先のズレ
      # (= introspect gate #290 が staging worker にだけ載り prod が全 API 503)
      # を解消する。[build] command = "npm run build" が deploy 時に nuxt build
      # を回すので script 側で build は呼ばない。
      deploy_staging_script: 'npx wrangler deploy'
      deploy_release_script: 'npx wrangler deploy'
      # #290 Phase 4 / #293: wrangler.toml に INTERNAL_SHARED_SECRET の
      # secrets_store_secrets binding を追加したので secret-verify が必須化する。
      # GCP cloudsql-sv の同名 secret を WIF で検証 (ohishi-exp org vars)。
      gcp_secret_verify_project: ${{ vars.GCP_PROJECT_ID_STAGING }}
      gcp_secret_verify_provider: ${{ vars.GCP_WIF_PROVIDER }}
      gcp_secret_verify_sa: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # cross-org (ohishi-exp → ippoan/ci-workflows) は secrets: inherit が
      # 効かないため明示渡し (Refs ippoan/ci-workflows#125)。これで内蔵
      # auto-merge job が App installation token を mint できる
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
      # deploy-release の traffic-report 用 (cross-org は inherit 不可 → 明示渡し)
      RELEASE_WAVE_WEBHOOK_SECRET: ${{ secrets.RELEASE_WAVE_WEBHOOK_SECRET }}
