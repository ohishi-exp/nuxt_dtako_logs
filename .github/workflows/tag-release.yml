name: Tag Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        required: true
        default: 'patch'
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    uses: ippoan/ci-workflows/.github/workflows/tag-release.yml@main
    with:
      bump: ${{ inputs.bump }}
    # cross-org reusable workflow には `secrets: inherit` が効かないため明示渡し
    # (CLAUDE.md feedback_cross_org_secrets)
    secrets:
      TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
